<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="favBg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4f46e5"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>
        <!-- Book Page Gradient Left -->
        <linearGradient id="pageLeft" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e0e7ff"/>
            <stop offset="90%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#cbd5e1"/>
        </linearGradient>
        <!-- Book Page Gradient Right -->
        <linearGradient id="pageRight" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#cbd5e1"/>
            <stop offset="10%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e0e7ff"/>
        </linearGradient>
        <!-- Gold Accent -->
        <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#f59e0b"/>
        </linearGradient>
    </defs>

    <!-- Rounded Container Badge -->
    <rect x="0" y="0" width="120" height="120" rx="28" fill="url(#favBg)"/>

    <!-- QUYỂN SÁCH MỞ 3D ĐẸP TÍNH NGHỆ THUẬT -->
    <!-- Bìa sách mỏng dưới -->
    <path d="M 16 86 C 36 78 56 86 60 88 C 64 86 84 78 104 86 L 104 81 C 84 73 64 81 60 83 C 56 81 36 73 16 81 Z" fill="#312e81" opacity="0.6"/>

    <!-- Trang trái -->
    <path d="M 18 80 C 38 72 56 80 59 82 L 59 44 C 56 42 38 34 18 42 Z" fill="url(#pageLeft)"/>
    <!-- Trang phải -->
    <path d="M 102 80 C 82 72 64 80 61 82 L 61 44 C 64 42 82 34 102 42 Z" fill="url(#pageRight)"/>

    <!-- Gáy sách trung tâm -->
    <path d="M 59 44 L 61 44 L 61 82 L 59 82 Z" fill="#4338ca"/>

    <!-- Dòng chữ/dòng kẻ trang sách -->
    <path d="M 28 52 Q 40 47 50 52" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 26 60 Q 40 54 50 60" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 28 68 Q 40 63 50 68" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>

    <path d="M 70 52 Q 80 47 92 52" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 70 60 Q 80 54 94 60" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 70 68 Q 80 63 92 68" stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Ruy-băng Dấu Sách Vàng Kim -->
    <path d="M 60 44 L 60 92 L 64 87 L 68 92 L 68 44 Z" fill="url(#goldAccent)"/>

    <!-- BIỂU TƯỢNG NGUYÊN TỬ VẬT LÍ NỔI RỰC RỠ -->
    <g transform="translate(60, 30) scale(0.65)">
        <!-- Quỹ đạo elip 1 -->
        <ellipse cx="0" cy="0" rx="34" ry="12" fill="none" stroke="#38bdf8" stroke-width="4.5" transform="rotate(30)"/>
        <!-- Quỹ đạo elip 2 -->
        <ellipse cx="0" cy="0" rx="34" ry="12" fill="none" stroke="#38bdf8" stroke-width="4.5" transform="rotate(-30)"/>
        <!-- Quỹ đạo elip 3 -->
        <ellipse cx="0" cy="0" rx="34" ry="12" fill="none" stroke="#38bdf8" stroke-width="4.5" transform="rotate(90)"/>

        <!-- Hạt nhân nguyên tử tỏa sáng -->
        <circle cx="0" cy="0" r="10" fill="#f43f5e"/>
        <circle cx="-2" cy="-2" r="3" fill="#ffffff" opacity="0.8"/>

        <!-- Electron vàng bay xung quanh -->
        <circle cx="27" cy="-13" r="5" fill="#facc15"/>
        <circle cx="-25" cy="14" r="5" fill="#facc15"/>
        <circle cx="0" cy="-33" r="5" fill="#facc15"/>
    </g>
</svg>
